        - name: 🪙 RouteKit-Crypto-Web3
          type: select
          proxies: [<JP_GROUP>, <SG_GROUP>, <HK_GROUP>, <TW_GROUP>, <AU_GROUP>, <KR_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 📈 RouteKit-Broker
          type: select
          proxies: [<HK_GROUP>, <JP_GROUP>, <TW_GROUP>, <SG_GROUP>, <US_GROUP>, <AU_GROUP>, <KR_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🌍 RouteKit-Proxy
          type: select
          proxies: [<FALLBACK_GROUP>, RouteKit-DIRECT]
