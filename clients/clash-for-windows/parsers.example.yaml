      append-rules:
        - MATCH,🌍 RouteKit-Proxy
      append-proxy-groups:
        - name: RouteKit-DIRECT
          type: select
          proxies: [DIRECT]
        - name: 🤖 RouteKit-AI
          type: select
          proxies: [<US_GROUP>, <JP_GROUP>, <SG_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 📺 RouteKit-YouTube
          type: select
          proxies: [<HK_GROUP>, <JP_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🎵 RouteKit-Spotify
          type: select
          proxies: [<SPOTIFY_REGION_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🛠 RouteKit-Dev-US
          type: select
          proxies: [<US_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🔧 RouteKit-Dev
          type: select
          proxies: [<JP_GROUP>, <SG_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🪙 RouteKit-Crypto-Web3
          type: select
          proxies: [<JP_GROUP>, <SG_GROUP>, <FALLBACK_GROUP>, RouteKit-DIRECT]
        - name: 🌍 RouteKit-Proxy
          type: select
          proxies: [<FALLBACK_GROUP>, RouteKit-DIRECT]
