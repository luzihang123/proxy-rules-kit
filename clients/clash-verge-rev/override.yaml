# ==================== 自定义策略组 ====================
# 使用 include-all-proxies + filter 自动匹配节点
# 换服务商/加订阅 不用改配置，正则自动适配
prepend-proxy-groups:
  # ---------- RouteKit 业务策略组 ----------
  - name: RouteKit-DIRECT
    type: select
    proxies:
      - DIRECT

  - name: 🤖 RouteKit-AI
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - 🇭🇰 香港节点
      - 🇬🇧 英国节点
      - 🇨🇦 加拿大节点
      - 🇩🇪 德国节点
      - RouteKit-DIRECT

  - name: 🌍 RouteKit-Proxy
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇺🇲 美国节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇬🇧 英国节点
      - 🇨🇦 加拿大节点
      - 🇩🇪 德国节点
      - RouteKit-DIRECT

  - name: 🛠 RouteKit-Dev-US
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - RouteKit-DIRECT

  - name: 📺 RouteKit-YouTube
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇹🇼 台湾节点
      - 🇸🇬 新加坡节点
      - 🇺🇲 美国节点
      - RouteKit-DIRECT

  - name: 🔧 RouteKit-Dev
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇺🇲 美国节点
      - RouteKit-DIRECT

  - name: 🎵 RouteKit-Spotify
    type: select
    proxies:
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇹🇼 台湾节点
      - 🇺🇲 美国节点
      - RouteKit-DIRECT

  - name: 🪙 RouteKit-Crypto-Web3
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇬🇧 英国节点
      - 🇨🇦 加拿大节点
      - 🇩🇪 德国节点
      - RouteKit-DIRECT

  # ---------- 地区节点组（自动匹配，不用手写节点名）----------
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)香港|香港HK|香港WAP|家宽|🇭🇰"

  - name: 🇹🇼 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)台湾|家宽|直连 0.5倍率|🇨🇳 台湾|🇹🇼"

  - name: 🇺🇲 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)美国|美国LA|美国USLA|洛杉矶|海外用户专用-美国|家宽|直连 0.5倍率|🇺🇸|🇺🇲"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)新加坡|海外用户专用-新加坡|直连 0.5倍率|🇸🇬"

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)日本|日本JP|海外用户专用-日本|直连 0.5倍率|🇯🇵"

  - name: 🇬🇧 英国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)英国|家宽|🇬🇧"

  - name: 🇨🇦 加拿大节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)加拿大|🇨🇦"

  - name: 🇩🇪 德国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)德国|德国DE|🇩🇪"
