# =====================================================
# RouteKit · Clash Verge Rev 扩展配置参考
# 当前按 macOS / Version 2.4.7 (2.4.7) 记录
# 2.4.7 更推荐直接使用 global-extend-script.js
# =====================================================
# 使用方法：
#   1. Clash Verge Rev → 订阅 → 配置卡片右键 → 编辑扩展
#   2. 粘贴本文件内容并保存
#   3. 如规则部分不生效，改用 global-extend-script.js
# =====================================================
# 核心特性：
#   - include-all-proxies: true  自动包含所有订阅节点
#   - filter: "正则"             按节点名自动分组，换服务商不用改
#   - fake-ip-filter            企业/内网域名不走 fake-ip，避免系统代理下内网直连异常
# =====================================================

