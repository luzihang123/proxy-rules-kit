    tolerance: 50
    include-all-proxies: true
    filter: "(?i)德国|德国DE|Germany|DE|🇩🇪"

  - name: 🇳🇬 尼日利亚自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)尼日利亚|尼日|Nigeria|NG|🇳🇬"

  # ═══ 地区组（手动选择）═══

  - name: 🇭🇰 香港节点
    type: select
    include-all-proxies: true
    filter: "(?i)香港|香港HK|香港WAP|HongKong|Hong Kong|HK|🇭🇰"

