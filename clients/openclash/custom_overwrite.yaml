  # ═══ 地区组（自动测速）═══
  # 用 url-test 自动选当前地区最快节点
  # filter 按节点名匹配；include-all-proxies 让订阅节点自动并入

  - name: 🇭🇰 香港自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)香港|香港HK|香港WAP|HongKong|Hong Kong|HK|🇭🇰"

  - name: 🇹🇼 台湾自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all-proxies: true
    filter: "(?i)台湾|台北|Taiwan|TW|🇨🇳\\s*台湾|🇹🇼"

  - name: 🇺🇲 美国自动
