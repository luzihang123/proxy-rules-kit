# =====================================================
# RouteKit · OpenClash 自定义覆写文件
# 路由器路径: /etc/openclash/custom/openclash_custom_overwrite.yaml
# =====================================================
# 适用内核: Clash Meta (Mihomo)
# 设计参考: clients/clash-verge-rev/generic-script.js
#           clients/shadowrocket/routekit.conf
# 三端策略组命名一致，节点排序逻辑一致
# =====================================================
# 这个文件做什么:
#   1. 覆写 DNS 设置（含 fake-ip-filter，避免企业/内网域名走 fake-ip）
#   2. 覆写 proxy-groups（生成 RouteKit-* 业务组 + 地区组双层结构）
#   3. 不覆写 rules，规则统一走 custom_rules.list / custom_rules_2.list
# =====================================================
# 注意:
#   - 业务组排序逻辑见同目录 README.md 和 clients/clash-verge-rev/README.md
#   - filter 使用 Go 正则，(?i) 表示不区分大小写
#   - include-all-proxies: true 会自动把订阅里的所有节点纳入候选
#   - 修改后需要在 OpenClash Web UI 重启服务才生效
# =====================================================

# ────────────────────────────────────────────────────
# DNS（关键: fake-ip-filter 必须含企业/内网域名）
# ────────────────────────────────────────────────────
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-filter: 这些域名不走 fake-ip，由系统 DNS 真实解析
  # 这是企业/内网域名能通过 RouteKit-DIRECT 真实访问的关键
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.example"
    - "*.alibaba.com"
    - "*.taobao.com"
    - "*.tmall.com"
    - "*.alipay.com"
    # 企业/内网域名示例：避免 fake-ip 影响 RouteKit-DIRECT 访问，按需替换
    - "*.corp.example.com"
    - "*.internal.example.test"
    - "corp.example.com"
    - "internal.example.test"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ────────────────────────────────────────────────────
# 策略组（地区组 + RouteKit 业务组）
# ────────────────────────────────────────────────────
# 策略组排序: RouteKit 业务组在前（用户常用），地区组在后
proxy-groups:
  # ═══ RouteKit 业务组（按业务风险/速度排序节点）═══
  - name: RouteKit-DIRECT
    type: select
    proxies:
      - DIRECT

  # Claude / Anthropic
  # 美国优先（可用性），尼日利亚作为汇率/计费可选项，再降级到日本/新加坡/港台
  - name: 🤖 RouteKit-Claude
    type: select
    proxies:
      - 🇺🇲 美国自动
      - 🇺🇲 美国节点
      - 🇳🇬 尼日利亚自动
      - 🇳🇬 尼日利亚节点
      - 🇯🇵 日本自动
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡自动
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾自动
      - 🇹🇼 台湾节点
      - 🇭🇰 香港自动
      - 🇭🇰 香港节点
      - RouteKit-DIRECT

  # ChatGPT / OpenAI
  - name: 🤖 RouteKit-ChatGPT
